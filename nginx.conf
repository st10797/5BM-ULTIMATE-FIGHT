# Nginx Configuration for Battaglia Navale Smash v5.2
# WebSocket Proxy + SSL + Resilienza + Header Upgrade Obbligatori

# HTTP → HTTPS Redirect
server {
  listen 80;
  server_name tuodominio.com;
  return 301 https://$host$request_uri;
}

# HTTPS Server con WebSocket Support
server {
  listen 443 ssl http2;
  server_name tuodominio.com;

  # ============================================================
  # SSL Configuration (Let's Encrypt)
  # ============================================================
  ssl_certificate /etc/letsencrypt/live/tuodominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tuodominio.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ============================================================
  # WebSocket Upgrade Headers (OBBLIGATORI - NON RIMUOVERE!)
  # ============================================================
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  # ============================================================
  # Forward Headers
  # ============================================================
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $server_name;
  proxy_set_header X-Forwarded-Port $server_port;

  # ============================================================
  # Timeout Settings (WebSocket needs LONG timeouts)
  # ============================================================
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_connect_timeout 60s;
  
  # HTTP/1.1 per WebSocket
  proxy_http_version 1.1;

  # ============================================================
  # Buffering (DISABILITATO per real-time)
  # ============================================================
  proxy_buffering off;
  proxy_request_buffering off;

  # ============================================================
  # Socket.IO Endpoint
  # ============================================================
  location /socket.io/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    # Upgrade headers già settati globalmente, ma li ripeti per chiarezza
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # ============================================================
  # API Endpoints
  # ============================================================
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
  }

  # ============================================================
  # Health Check
  # ============================================================
  location /health {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
  }

  # ============================================================
  # Frontend Static Assets (Vite/React)
  # ============================================================
  location / {
    proxy_pass http://127.0.0.1:5173;
    proxy_http_version 1.1;
    # Per asset statici, abilita caching
    proxy_cache_bypass $http_upgrade;
  }

  # ============================================================
  # Gzip Compression (opzionale, non per WebSocket)
  # ============================================================
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;
  gzip_min_length 1000;
  gzip_disable "msie6";
}

# ============================================================
# Upstream Backend (per load balancing multi-istanza)
# ============================================================
upstream backend {
  least_conn;
  server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
  # Aggiungi altri backend se necessario:
  # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
  # server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

