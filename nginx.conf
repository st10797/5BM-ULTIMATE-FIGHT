# Nginx Configuration for Battaglia Navale Smash v5.2
# WebSocket Proxy + SSL + Resilienza

server {
  listen 80;
  server_name tuodominio.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name tuodominio.com;

  # SSL Certificates (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/tuodominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tuodominio.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # WebSocket Upgrade Headers (CRITICAL)
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "Upgrade";

  # Forward Headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Timeout Settings (WebSocket needs long timeouts)
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_connect_timeout 60s;

  # Buffering
  proxy_buffering off;
  proxy_request_buffering off;

  # Socket.IO Endpoint
  location /socket.io/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
  }

  # API Endpoints
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
  }

  # Frontend Static Assets
  location / {
    proxy_pass http://127.0.0.1:5173; # o il tuo frontend
    proxy_http_version 1.1;
  }

  # Health Check
  location /health {
    proxy_pass http://127.0.0.1:3000;
  }
}

# Upstream Backend (per load balancing multi-istanza)
upstream backend {
  least_conn;
  server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
  # Aggiungi altri backend se necessario:
  # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
  # server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
}

# Sticky Sessions (per WebSocket)
map $remote_addr $backend_id {
  default "backend";
}
